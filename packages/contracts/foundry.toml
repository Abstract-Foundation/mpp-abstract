[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "solady/=lib/solady/src/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
abstract_testnet = "${ABSTRACT_TESTNET_RPC}"
abstract_mainnet = "${ABSTRACT_MAINNET_RPC}"

[etherscan]
abstract_testnet = { key = "${ABSCAN_API_KEY}", url = "https://api-sepolia.abscan.org/api" }
abstract_mainnet = { key = "${ABSCAN_API_KEY}", url = "https://api.abscan.org/api" }
