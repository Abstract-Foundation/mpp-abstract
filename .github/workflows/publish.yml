name: Publish

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release Commit
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspaces
        run: pnpm -r --if-present typecheck

      - name: Build publishable package
        run: pnpm --filter @abstract-foundation/mpp build

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Solidity dependencies
        working-directory: packages/contracts
        run: forge soldeer install

      - name: Run Foundry tests
        working-directory: packages/contracts
        run: forge test -v

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@abstract-foundation/mpp
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout merged release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish packages
        run: pnpm release
